<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Server Error</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    .error-box {
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }
    .error-box h1 { font-size: 3rem; margin-bottom: 15px; }
    .error-box p { font-size: 1.2rem; }
    .btn-home {
      margin-top: 20px;
      background: white;
      color: #667eea;
      font-weight: 600;
      border-radius: 8px;
      padding: 10px 20px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="error-box">
    <h1>500</h1>
    <p>Something went wrong. Please try again later.</p>
    <a href="/" class="btn-home">← Back to Home</a>
  </div>
</body>
</html>
